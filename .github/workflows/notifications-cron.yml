name: Disparar Notificações

on:
  schedule:
    # Roda a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de notificações
        run: |
          response=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://agendamento.solucoesdeia.com/api/cron/notifications")
          cat /tmp/resp.json
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Falha no endpoint!"
            exit 1
          fi
